<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Inventory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="navbar-slot"></div>

  <div class="flex">
    <aside class="w-48 min-h-screen bg-white border-r border-gray-200 p-4 space-y-1" id="sidebar-slot"></aside>

    <main class="flex-1 p-6">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-gray-900">Products</h2>
        <button onclick="openForm()"
          class="bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
          + New Product
        </button>
      </div>

      <!-- Filters -->
      <div class="flex gap-3 mb-4">
        <input id="search-input" type="text" placeholder="Search by name..."
          oninput="loadProducts()"
          class="px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 w-52" />
        <input id="category-input" type="text" placeholder="Filter by category..."
          oninput="loadProducts()"
          class="px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 w-48" />
      </div>

      <!-- Success / Error banner -->
      <p id="products-success" class="hidden mb-3 text-sm text-green-700 bg-green-50 border border-green-200 rounded-md px-3 py-2"></p>
      <p id="products-error"   class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <!-- Table -->
      <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-gray-500 border-b border-gray-200 bg-gray-50">
              <th class="px-4 py-3 font-medium">Name</th>
              <th class="px-4 py-3 font-medium">SKU</th>
              <th class="px-4 py-3 font-medium">Category</th>
              <th class="px-4 py-3 font-medium">Price</th>
              <th class="px-4 py-3 font-medium">Stock</th>
              <th class="px-4 py-3 font-medium">Status</th>
              <th class="px-4 py-3 font-medium">Actions</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <tr><td colspan="7" class="px-4 py-6 text-gray-400 text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center gap-3 mt-4">
        <button id="btn-prev" onclick="changePage(-1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Previous
        </button>
        <span id="page-info" class="text-sm text-gray-500">Page 1</span>
        <button id="btn-next" onclick="changePage(1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Next
        </button>
      </div>

    </main>
  </div>

  <!-- Slide-in Form Panel -->
  <div id="form-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40" onclick="closeForm()"></div>
  <div id="form-panel"
    class="hidden fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-xl z-50 flex flex-col">

    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h3 id="form-title" class="text-base font-semibold text-gray-900">New Product</h3>
      <button onclick="closeForm()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>

    <form id="product-form" onsubmit="handleSubmit(event)" class="flex-1 overflow-y-auto p-6 space-y-4">
      <input type="hidden" id="edit-id" />

      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
          <input id="f-name" type="text" required
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">SKU <span class="text-red-500">*</span></label>
          <input id="f-sku" type="text" required
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
          <input id="f-category" type="text"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Price <span class="text-red-500">*</span></label>
          <input id="f-price" type="number" step="0.01" min="0.01" required
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
          <input id="f-unit" type="text" placeholder="pcs"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="f-description" rows="2"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 resize-none"></textarea>
        </div>
      </div>

      <!-- Stock settings — only shown when creating -->
      <div id="stock-fields">
        <p class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-2">Initial Stock Settings</p>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Initial Stock</label>
            <input id="f-initial-stock" type="number" min="0" value="0"
              class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Reorder At</label>
            <input id="f-reorder-level" type="number" min="0" value="10"
              class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Reorder Qty</label>
            <input id="f-reorder-qty" type="number" min="0" value="50"
              class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
          </div>
        </div>
      </div>

      <p id="form-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <button type="submit" id="form-submit-btn"
        class="w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
        Save Product
      </button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/products.js"></script>
  <script>
    renderLayout("products");
    loadProducts();
  </script>
</body>
</html>
