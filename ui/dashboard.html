<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Inventory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="navbar-slot"></div>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-48 min-h-screen bg-white border-r border-gray-200 p-4 space-y-1" id="sidebar-slot"></aside>

    <!-- Main -->
    <main class="flex-1 p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-6">Dashboard</h2>

      <!-- Stat Cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Total Products</p>
          <p id="stat-products" class="text-2xl font-semibold text-gray-900">—</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Low Stock Items</p>
          <p id="stat-lowstock" class="text-2xl font-semibold text-amber-600">—</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Transactions</p>
          <p id="stat-transactions" class="text-2xl font-semibold text-gray-900">—</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm admin-only">
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Active Users</p>
          <p id="stat-users" class="text-2xl font-semibold text-gray-900">—</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- Recent Transactions -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
          <div class="px-4 py-3 border-b border-gray-200">
            <h3 class="text-sm font-medium text-gray-900">Recent Transactions</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-left text-xs text-gray-500 border-b border-gray-100">
                  <th class="px-4 py-2 font-medium">Product</th>
                  <th class="px-4 py-2 font-medium">Type</th>
                  <th class="px-4 py-2 font-medium">Qty</th>
                  <th class="px-4 py-2 font-medium">Date</th>
                </tr>
              </thead>
              <tbody id="recent-txn-body">
                <tr><td colspan="4" class="px-4 py-4 text-gray-400 text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Low Stock Alerts -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
          <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
            <h3 class="text-sm font-medium text-gray-900">Low Stock Alerts</h3>
            <a href="inventory.html" class="text-xs text-gray-500 hover:text-gray-700">View all</a>
          </div>
          <div id="low-stock-list" class="divide-y divide-gray-100">
            <p class="px-4 py-4 text-gray-400 text-sm text-center">Loading...</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    renderLayout("dashboard");
    loadDashboard();
  </script>
</body>
</html>
