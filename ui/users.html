<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — Inventory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="navbar-slot"></div>

  <div class="flex">
    <aside class="w-48 min-h-screen bg-white border-r border-gray-200 p-4 space-y-1" id="sidebar-slot"></aside>

    <main class="flex-1 p-6">

      <h2 class="text-lg font-semibold text-gray-900 mb-6">Users</h2>

      <p id="users-success" class="hidden mb-3 text-sm text-green-700 bg-green-50 border border-green-200 rounded-md px-3 py-2"></p>
      <p id="users-error"   class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <!-- Admin: User Table -->
      <div id="admin-section" class="hidden">
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-x-auto mb-6">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs text-gray-500 border-b border-gray-200 bg-gray-50">
                <th class="px-4 py-3 font-medium">Name</th>
                <th class="px-4 py-3 font-medium">Username</th>
                <th class="px-4 py-3 font-medium">Email</th>
                <th class="px-4 py-3 font-medium">Role</th>
                <th class="px-4 py-3 font-medium">Status</th>
                <th class="px-4 py-3 font-medium">Actions</th>
              </tr>
            </thead>
            <tbody id="users-body">
              <tr><td colspan="6" class="px-4 py-6 text-gray-400 text-center">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Own Profile Card (all users see this) -->
      <div id="profile-section">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

          <!-- Profile Details -->
          <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
            <h3 class="text-sm font-semibold text-gray-900 mb-4">My Profile</h3>
            <div id="profile-info" class="space-y-3 text-sm text-gray-700">
              <p class="text-gray-400">Loading...</p>
            </div>
            <button onclick="showEditProfile()" class="mt-4 text-sm border border-gray-200 rounded-md px-4 py-1.5 hover:bg-gray-50">
              Edit Profile
            </button>
          </div>

          <!-- Change Password -->
          <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6">
            <h3 class="text-sm font-semibold text-gray-900 mb-4">Change Password</h3>
            <form onsubmit="handleChangePassword(event)" class="space-y-3">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                <input id="pw-old" type="password" required
                  class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input id="pw-new" type="password" required
                  class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
              </div>
              <p id="pw-error"   class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>
              <p id="pw-success" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-md px-3 py-2"></p>
              <button type="submit"
                class="bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
                Update Password
              </button>
            </form>
          </div>

        </div>
      </div>

    </main>
  </div>

  <!-- Edit Profile Modal -->
  <div id="edit-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 id="edit-modal-title" class="text-base font-semibold text-gray-900">Edit Profile</h3>
        <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <form onsubmit="handleEditUser(event)" class="space-y-3">
        <input type="hidden" id="edit-user-id" />
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input id="e-firstname" type="text"
              class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input id="e-lastname" type="text"
              class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="e-email" type="email"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input id="e-phone" type="tel"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <!-- Role field: admin only, editing other users -->
        <div id="role-field" class="hidden">
          <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <select id="e-role"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <p id="edit-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>
        <button type="submit"
          class="w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
          Save Changes
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/users.js"></script>
  <script>
    renderLayout("users");
    initUsersPage();
  </script>
</body>
</html>
