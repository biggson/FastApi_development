<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory — Inventory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="navbar-slot"></div>

  <div class="flex">
    <aside class="w-48 min-h-screen bg-white border-r border-gray-200 p-4 space-y-1" id="sidebar-slot"></aside>

    <main class="flex-1 p-6">

      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-900">Inventory</h2>
        <div class="flex gap-2">
          <button id="btn-all" onclick="filterView('all')"
            class="text-sm border border-gray-300 bg-gray-800 text-white rounded-md px-3 py-1.5">
            All Items
          </button>
          <button id="btn-low" onclick="filterView('low')"
            class="text-sm border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-md px-3 py-1.5">
            Low Stock
          </button>
        </div>
      </div>

      <!-- Info Banner -->
      <div class="mb-4 bg-amber-50 border border-amber-200 rounded-md px-4 py-2 text-sm text-amber-700">
        Stock quantities can only be changed via <a href="transactions.html" class="underline font-medium">Transactions</a>.
        You can update reorder settings here (admin only).
      </div>

      <p id="inv-success" class="hidden mb-3 text-sm text-green-700 bg-green-50 border border-green-200 rounded-md px-3 py-2"></p>
      <p id="inv-error"   class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <!-- Table -->
      <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-gray-500 border-b border-gray-200 bg-gray-50">
              <th class="px-4 py-3 font-medium">Product</th>
              <th class="px-4 py-3 font-medium">SKU</th>
              <th class="px-4 py-3 font-medium">On Hand</th>
              <th class="px-4 py-3 font-medium">Reorder At</th>
              <th class="px-4 py-3 font-medium">Reorder Qty</th>
              <th class="px-4 py-3 font-medium">Status</th>
              <th class="px-4 py-3 font-medium admin-only">Edit</th>
            </tr>
          </thead>
          <tbody id="inv-body">
            <tr><td colspan="7" class="px-4 py-6 text-gray-400 text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center gap-3 mt-4">
        <button id="btn-prev" onclick="changePage(-1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Previous
        </button>
        <span id="page-info" class="text-sm text-gray-500">Page 1</span>
        <button id="btn-next" onclick="changePage(1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Next
        </button>
      </div>

    </main>
  </div>

  <!-- Edit Reorder Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-semibold text-gray-900">Edit Reorder Settings</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>
      <p id="modal-product-name" class="text-sm text-gray-500 mb-4"></p>
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Reorder Level</label>
          <input id="m-reorder-level" type="number" min="0"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Reorder Quantity</label>
          <input id="m-reorder-qty" type="number" min="0"
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <p id="modal-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>
        <input type="hidden" id="m-product-id" />
        <button onclick="saveReorder()"
          class="w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
          Save Changes
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/inventory.js"></script>
  <script>
    renderLayout("inventory");
    if (!isAdmin()) {
      document.querySelectorAll(".admin-only").forEach(el => el.classList.add("hidden"));
    }
    loadInventory();
  </script>
</body>
</html>
