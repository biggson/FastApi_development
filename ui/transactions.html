<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions — Inventory App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="navbar-slot"></div>

  <div class="flex">
    <aside class="w-48 min-h-screen bg-white border-r border-gray-200 p-4 space-y-1" id="sidebar-slot"></aside>

    <main class="flex-1 p-6">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-gray-900">Transactions</h2>
        <button onclick="openForm()"
          class="bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
          + New Transaction
        </button>
      </div>

      <!-- Filters -->
      <div class="flex gap-3 mb-4 flex-wrap">
        <select id="filter-type" onchange="loadTransactions()"
          class="px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
          <option value="">All Types</option>
          <option value="IN">IN</option>
          <option value="OUT">OUT</option>
          <option value="RETURN">RETURN</option>
          <option value="ADJUSTMENT">ADJUSTMENT</option>
        </select>
      </div>

      <p id="txn-success" class="hidden mb-3 text-sm text-green-700 bg-green-50 border border-green-200 rounded-md px-3 py-2"></p>
      <p id="txn-error"   class="hidden mb-3 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <!-- Table -->
      <div class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-gray-500 border-b border-gray-200 bg-gray-50">
              <th class="px-4 py-3 font-medium">Date</th>
              <th class="px-4 py-3 font-medium">Product</th>
              <th class="px-4 py-3 font-medium">Type</th>
              <th class="px-4 py-3 font-medium">Qty</th>
              <th class="px-4 py-3 font-medium">Unit Price</th>
              <th class="px-4 py-3 font-medium">Total</th>
              <th class="px-4 py-3 font-medium">Reference</th>
              <th class="px-4 py-3 font-medium">By</th>
            </tr>
          </thead>
          <tbody id="txn-body">
            <tr><td colspan="8" class="px-4 py-6 text-gray-400 text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center gap-3 mt-4">
        <button id="btn-prev" onclick="changePage(-1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Previous
        </button>
        <span id="page-info" class="text-sm text-gray-500">Page 1</span>
        <button id="btn-next" onclick="changePage(1)"
          class="text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-md px-3 py-1 disabled:opacity-40">
          Next
        </button>
      </div>

    </main>
  </div>

  <!-- New Transaction Panel -->
  <div id="form-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40" onclick="closeForm()"></div>
  <div id="form-panel"
    class="hidden fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-xl z-50 flex flex-col">

    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <h3 class="text-base font-semibold text-gray-900">New Transaction</h3>
      <button onclick="closeForm()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>

    <form id="txn-form" onsubmit="handleSubmit(event)" class="flex-1 overflow-y-auto p-6 space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Product <span class="text-red-500">*</span></label>
        <select id="f-product" required
          class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
          <option value="">Loading products...</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type <span class="text-red-500">*</span></label>
        <select id="f-type" required
          class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
          <option value="IN">IN — Stock received</option>
          <option value="OUT">OUT — Stock sold / used</option>
          <option value="RETURN">RETURN — Goods returned</option>
          <option id="opt-adjustment" value="ADJUSTMENT" class="admin-only hidden">ADJUSTMENT — Set quantity directly (admin)</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
          <input id="f-quantity" type="number" min="1" required
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price <span class="text-red-500">*</span></label>
          <input id="f-price" type="number" step="0.01" min="0" required
            class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Reference Number</label>
        <input id="f-reference" type="text" placeholder="e.g. PO-001"
          class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea id="f-notes" rows="2" placeholder="Optional notes..."
          class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 resize-none"></textarea>
      </div>

      <p id="form-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></p>

      <button type="submit" id="form-submit-btn"
        class="w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
        Record Transaction
      </button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/transactions.js"></script>
  <script>
    renderLayout("transactions");
    loadTransactions();
  </script>
</body>
</html>
