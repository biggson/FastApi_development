name: CI / CD

on:
  pull_request:
    branches: [main]
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── CI ────────────────────────────────────────────────────────────────────
  ci:
    name: Check app loads
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pydantic[email]"

      - name: Check app loads
        run: python -c "from src.main import app; print('App loaded OK')"
        env:
          AZURE_SQL_SERVER: placeholder
          AZURE_SQL_DATABASE: placeholder
          AZURE_SQL_USERNAME: placeholder
          AZURE_SQL_PASSWORD: placeholder
          AZURE_SQL_DRIVER: "ODBC Driver 18 for SQL Server"
          SECRET_KEY: placeholder_secret_key_for_ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30

  # ── CD ────────────────────────────────────────────────────────────────────
  deploy:
    name: Build → Push to ACR → Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/boarder-api:latest

      - name: Create or update Container App
        run: |
          STATUS=$(az containerapp show \
            --name boarder-api \
            --resource-group boarder_rg \
            --query properties.provisioningState \
            -o tsv 2>/dev/null || echo "NotFound")

          if [ "$STATUS" = "Failed" ]; then
            echo "Container app is in failed state — deleting and recreating..."
            az containerapp delete --name boarder-api --resource-group boarder_rg --yes
            STATUS="NotFound"
          fi

          if [ "$STATUS" = "Succeeded" ]; then
            echo "Container app exists — updating image..."
            az containerapp registry set \
              --name boarder-api \
              --resource-group boarder_rg \
              --server ${{ secrets.ACR_LOGIN_SERVER }} \
              --username ${{ secrets.ACR_USERNAME }} \
              --password ${{ secrets.ACR_PASSWORD }}
            az containerapp update \
              --name boarder-api \
              --resource-group boarder_rg \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/boarder-api:latest
          else
            echo "Container app not found — creating..."
            az containerapp create \
              --name boarder-api \
              --resource-group boarder_rg \
              --environment boarder-env \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/boarder-api:latest \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 1 \
              --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --env-vars \
                AZURE_SQL_SERVER="${{ secrets.AZURE_SQL_SERVER }}" \
                AZURE_SQL_DATABASE="${{ secrets.AZURE_SQL_DATABASE }}" \
                AZURE_SQL_USERNAME="${{ secrets.AZURE_SQL_USERNAME }}" \
                AZURE_SQL_PASSWORD="${{ secrets.AZURE_SQL_PASSWORD }}" \
                "AZURE_SQL_DRIVER=ODBC Driver 18 for SQL Server" \
                SECRET_KEY="${{ secrets.SECRET_KEY }}" \
                ALGORITHM="HS256" \
                ACCESS_TOKEN_EXPIRE_MINUTES="30"
          fi
